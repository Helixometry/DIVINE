model:
  mod1_in_dim: 512
  mod2_in_dim: 768
  refine_dim: 128
  window_latent_dim: 64
  shared_dim: 64
  private_dim: 64
  token_dim: 64
  num_tokens: 5
  dropout: 0.1
  use_local_vae: true
  use_token_reasoner: true
  use_cycle_loss: true
  use_sparse_gating: true
  beta_shared: 1.0
  beta_private: 1.0

head:
  type: classification
  num_classes: 4
  hidden_dim: 128

loss:
  prediction: cross_entropy
  aux_weights:
    local_utt: 1.0
    cycle: 0.1
    sparse: 0.1
    token: 0.04

training:
  batch_size: 8
  lr: 0.0001
  epochs: 5
